---
dependency:
  name: galaxy
driver:
  name: default
platforms:
  - name: ubuntu1804
    image_name: Ubuntu 18.04 64-bit (Ansible)
    groups: ['ssh']

  - name: ubuntu2004
    image_name: Ubuntu 20.04 64-bit (Ansible)
    groups: ['ssh']

  - name: ubuntu2204
    image_name: Ubuntu 22.04 64-bit
    groups: ['ssh']

  - name: ubuntu2404
    image_name: Ubuntu 24.04 64-bit
    groups: ['ssh']
provisioner:
  name: ansible
  playbooks:
    create: ../default/create-os.yml
    destroy: ../default/destroy-os.yml
    prepare: ../default-deploy/prepare.yml
    converge: ../default-deploy/converge.yml
    verify: ../default-deploy/verify.yml
verifier:
  name: ansible
