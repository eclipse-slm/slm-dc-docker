---
- name: Install docker role
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:
    - name: Install docker role
      ansible.builtin.command:
        cmd: ansible-galaxy role install -r ../../../requirements.yml

    - name: Ensure Molecule roles directory exists
      ansible.builtin.file:
        path: "{{ playbook_dir }}/roles"
        state: directory
        mode: "0755"

    - name: Link "use" role for Molecule
      ansible.builtin.file:
        src: "{{ playbook_dir }}/../../../use"
        dest: "{{ playbook_dir }}/roles/use"
        state: link
        force: true

- name: Prepare for Installation (ssh)
  hosts: all
  gather_facts: false
  become: true
  vars:
    state: prepare
  tasks:
    - name: Prepare docker host
      ansible.builtin.include_role:
        name: "docker"

- name: Prepare
  hosts: all
  gather_facts: true
  become: true
  tasks:
    - name: "Include setup - install"
      when: ansible_facts['os_family'] != "Windows"
      ansible.builtin.include_role:
        name: "docker"

    - name: Include vars file
      ansible.builtin.include_vars:
        file: ./vars/main.yml

    - name: LINUX Deployment
      when: ansible_facts['os_family'] != "Windows"
      block:

        - name: "Include use - deploy (service-1)"
          ansible.builtin.include_role:
            name: "use"
            tasks_from: deploy.yml
          vars:
            service_id: "{{ service_id_1 }}"
            docker_compose_file: "{{ docker_compose_file_1 }}"


        - name: "Include use - deploy (service-2)"
          ansible.builtin.include_role:
            name: "use"
            tasks_from: deploy.yml
          vars:
            service_id: "{{ service_id_2 }}"
            docker_compose_file: "{{ docker_compose_file_2 }}"


        - name: "Include use - deploy (service-3)"
          ansible.builtin.include_role:
            name: "use"
            tasks_from: deploy.yml
          vars:
            service_id: "{{ service_id_3 }}"
            docker_compose_file: "{{ docker_compose_file_3 }}"

    - name: WINDOWS Deployment
      when: ansible_facts['os_family'] == "Windows"
      block:

        - name: "Include use - deploy (service-1)"
          ansible.builtin.include_role:
            name: "use"
            tasks_from: deploy.yml
          vars:
            service_id: "{{ service_id_1 }}"
            docker_compose_file: "{{ docker_compose_file_1_win }}"


        - name: "Include use - deploy (service-2)"
          ansible.builtin.include_role:
            name: "use"
            tasks_from: deploy.yml
          vars:
            service_id: "{{ service_id_2 }}"
            docker_compose_file: "{{ docker_compose_file_2_win }}"


        - name: "Include use - deploy (service-3)"
          ansible.builtin.include_role:
            name: "use"
            tasks_from: deploy.yml
          vars:
            service_id: "{{ service_id_3 }}"
            docker_compose_file: "{{ docker_compose_file_3_win }}"