---
- name: Converge
  hosts: all
  gather_facts: true
  become: true
  tasks:
    - name: Include vars file
      ansible.builtin.include_vars:
        file: ./vars/main.yml

    - name: Converge Windows
      when: ansible_facts['os_family'] == "Windows"
      block:
        - name: "Set facts for Windows (service 1)"
          ansible.builtin.set_fact:
            service_id: "{{ service_id_win }}"
            docker_compose_file: "{{ docker_compose_file_win }}"

        - name: "Include use - install"
          ansible.builtin.include_role:
            name: "use"
            tasks_from: deploy.yml

    - name: Converge Linux
      when: ansible_facts['os_family'] != "Windows"
      block:
        - name: "Set facts for Linux (service 1)"
          ansible.builtin.set_fact:
            service_id: "{{ service_id_1 }}"
            docker_compose_file: "{{ docker_compose_file_1 }}"

        - name: "Include use - install"
          ansible.builtin.include_role:
            name: "use"
            tasks_from: deploy.yml

        - name: "Set facts for Linux (service 2)"
          ansible.builtin.set_fact:
            service_id: "{{ service_id_2 }}"
            docker_compose_file: "{{ docker_compose_file_2 }}"

        - name: "Include use - install"
          ansible.builtin.include_role:
            name: "use"
            tasks_from: deploy.yml
